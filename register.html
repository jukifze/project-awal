<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Platform Jasa Kreatif Mahasiswa</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>


<div class="title-card">
    <h1>Platform Jasa Kreatif Mahasiswa</h1>
    </div>
    <p class="subtitle">Bergabung dan tawarkan jasa kreatifmu</p>


<!-- Register Section -->
<div class="register-container">

    <div class="register-box">
        <h2>Daftar Akun</h2>
        <p>Buat akun untuk mulai menawarkan jasa</p>

        <form>

            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Masukkan email" required>

            <label for="hp">No HP</label>
            <input type="text" id="hp" name="hp" placeholder="Masukkan nomor HP">

            <label for="skill">Keahlian</label>
            <input type="text" id="skill" name="skill" placeholder="Contoh: Desain Grafis">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Masukkan password" required>

            <label for="confirm">Konfirmasi Password</label>
            <input type="password" id="confirm" name="confirm" placeholder="Ulangi password" required>

            <button type="submit">Daftar</button>

        </form>

        <div class="login-link">
            Sudah punya akun? <a href="login.html">Login disini</a>
        </div>

    </div>

</div>

<!-- Footer -->
<footer>
    <p>© 2026 Platform Jasa Kreatif Mahasiswa</p>
</footer>

</body>
</html>
