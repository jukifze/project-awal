<header>
    <h1>Platform Jasa Kreatif Mahasiswa</h1>
    <p>Bergabung dan tawarkan jasa kreatifmu</p>
</header>

<div class="register-container">

    <div class="register-box">
        <h2>Daftar Akun</h2>
        <p>Buat akun untuk mulai menawarkan jasa</p>

        <form>

            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama lengkap" required>

            <label>Email</label>
            <input type="email" placeholder="Masukkan email" required>

            <label>No HP</label>
            <input type="text" placeholder="Masukkan nomor HP">

            <label>Keahlian</label>
            <input type="text" placeholder="Contoh: Desain Grafis">

            <label>Password</label>
            <input type="password" placeholder="Masukkan password">

            <label>Konfirmasi Password</label>
            <input type="password" placeholder="Ulangi password">

            <button type="submit">Daftar</button>
            
        </form>

        <div class="login-link">
            Sudah punya akun? <a href="login.html">Login disini</a>
        </div>

    </div>

</div>

<!-- Footer -->
<footer>
    <p>© 2026 Platform Jasa Kreatif Mahasiswa</p>
